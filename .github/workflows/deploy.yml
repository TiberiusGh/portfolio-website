name: Deploy Portfolio

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy with rsync
        run: |
          echo "📦 Syncing built site..."
          rsync -rltvz --delete --no-perms --no-owner --no-group --no-times \
            dist/ /var/www/tiberiusgh.com/
          echo "✅ Portfolio synced!"
